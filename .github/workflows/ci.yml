name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly soak on the default branch. The job itself is also guarded so
    # it cannot be enabled by pull-request or manual-dispatch events.
    - cron: '17 3 * * *'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_privileged_btrfs:
        description: Run the ignored loopback Btrfs integration test on the dedicated privileged runner
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace
      - name: Test durable RocksDB catalog
        run: cargo test -p reflink-forest-index --features rocksdb-backend

  privileged-btrfs:
    # This runs only when an operator explicitly dispatches the workflow. The
    # label must designate an isolated VM with loop support and CAP_SYS_ADMIN;
    # ordinary hosted CI remains unprivileged and never queues this job.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_privileged_btrfs }}
    runs-on: [self-hosted, linux, btrfs-privileged]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run isolated loopback Btrfs integration suite
        env:
          REFLINK_FOREST_RUN_PRIVILEGED_BTRFS_TESTS: "1"
        run: cargo test -p reflink-forest-btrfs --test privileged_loopback -- --ignored
      - name: Verify Btrfs raw checkout and restored cold-tier checkout
        # The portable tests tolerate an unsupported FICLONE ioctl so that
        # normal hosted CI can validate the cold-data and publication paths.
        # This dedicated Btrfs runner is the required acceptance boundary:
        # both tests must actually complete their FICLONE materialization.
        run: |
          cargo test -p reflink-forest-workspace --test checkout_acceptance
          cargo test -p reflink-forest-workspace restored_cold_tier_materializes_a_workspace_without_the_original_tree -- --exact

  m1-million-record-soak:
    # Run on protected main pushes, the default-branch nightly schedule, and
    # published releases—not on pull requests or manual workflow dispatches.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run the release million-record cold-store soak
        env:
          REFLINK_FOREST_RUN_MILLION_RECORD_SOAK: "1"
        run: >-
          cargo test --release -p reflink-forest-store --test million_record_soak
          million_record_soak -- --ignored --exact

  m8-fuzz:
    # Nightly/default-branch and published-release hardening only. Fuzzing is
    # intentionally excluded from pull requests and protected-main pushes.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install the cargo-fuzz runner
        run: cargo +nightly install cargo-fuzz --locked
      - name: Run bounded parser, codec, and recovery fuzz campaign
        working-directory: fuzz
        run: |
          for target in format_decode codec_decode open_chunk_recovery snapshot_manifest_decode backup_decode; do
            cargo +nightly fuzz run "$target" -- -max_total_time=120 -rss_limit_mb=512 -timeout=5
          done
