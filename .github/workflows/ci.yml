name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_privileged_btrfs:
        description: Run the ignored loopback Btrfs integration test on the dedicated privileged runner
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace
      - name: Test durable RocksDB catalog
        run: cargo test -p reflink-forest-index --features rocksdb-backend

  privileged-btrfs:
    # This runs only when an operator explicitly dispatches the workflow. The
    # label must designate an isolated VM with loop support and CAP_SYS_ADMIN;
    # ordinary hosted CI remains unprivileged and never queues this job.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_privileged_btrfs }}
    runs-on: [self-hosted, linux, btrfs-privileged]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run isolated loopback Btrfs integration test
        env:
          REFLINK_FOREST_RUN_PRIVILEGED_BTRFS_TESTS: "1"
        run: cargo test -p reflink-forest-btrfs --test privileged_loopback loopback_initialization_survives_reattach_and_refuses_overwrite -- --ignored --exact
